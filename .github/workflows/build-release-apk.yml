name: Build Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-release-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release-apk:
    name: Build signed release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEYSTORE_FILE_NAME: ${{ secrets.ANDROID_KEYSTORE_FILE_NAME }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate signing secrets
        shell: bash
        run: |
          missing=()

          [[ -n "${ANDROID_KEYSTORE_BASE64}" ]] || missing+=("ANDROID_KEYSTORE_BASE64")
          [[ -n "${ANDROID_KEYSTORE_PASSWORD}" ]] || missing+=("ANDROID_KEYSTORE_PASSWORD")
          [[ -n "${ANDROID_KEY_ALIAS}" ]] || missing+=("ANDROID_KEY_ALIAS")
          [[ -n "${ANDROID_KEY_PASSWORD}" ]] || missing+=("ANDROID_KEY_PASSWORD")

          if ((${#missing[@]} > 0)); then
            echo "::error::Missing required GitHub Actions secrets: ${missing[*]}"
            exit 1
          fi

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Recreate release keystore
        shell: bash
        run: |
          keystore_dir="${RUNNER_TEMP}/android-signing"
          keystore_name="${ANDROID_KEYSTORE_FILE_NAME:-release-keystore.jks}"

          mkdir -p "${keystore_dir}"
          keystore_path="${keystore_dir}/${keystore_name}"

          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${keystore_path}"

          {
            echo "ANDROID_KEYSTORE_PATH=${keystore_path}"
          } >> "${GITHUB_ENV}"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Verify release APK output
        shell: bash
        run: |
          apk_path="app/build/outputs/apk/release/app-release.apk"

          if [[ ! -f "${apk_path}" ]]; then
            echo "::error::Expected APK not found at ${apk_path}"
            exit 1
          fi

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lensesreminder-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
